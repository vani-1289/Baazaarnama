<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <!-- Definitions for Reusable Elements -->
  <defs>
    <!-- Shadow for the smartphone -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#3B2F2F" flood-opacity="0.15" />
    </filter>
  </defs>

  <g id="logo-graphics">
    <!-- 1. Indian Heritage Mandala Outline (Teal / Blue-Green) -->
    <g id="mandala-frame" fill="none" stroke="#0F5A5C" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
      <!-- Outer mihrab/dome shape at the top -->
      <path d="M 150,15 C 165,35 155,50 180,45 C 205,40 215,65 210,80 C 235,80 245,100 245,120 C 245,140 235,160 210,160 C 215,175 205,200 180,195 C 155,190 165,205 150,225 C 135,205 145,190 120,195 C 95,200 85,175 90,160 C 65,160 55,140 55,120 C 55,100 65,80 90,80 C 85,65 95,40 120,45 C 145,50 135,35 150,15 Z" />
      
      <!-- Inner circular decorative frame -->
      <circle cx="150" cy="120" r="85" stroke-dasharray="3,8" stroke-width="2.5" />
      <circle cx="150" cy="120" r="75" stroke-width="1.5" opacity="0.7" />

      <!-- Mandala leaves / floral petals -->
      <!-- Top -->
      <path d="M 150,20 C 147,32 153,32 150,45 C 147,32 143,32 150,20 Z" fill="#0F5A5C" />
      <!-- Left -->
      <path d="M 60,120 C 72,117 72,123 85,120 C 72,123 72,127 60,120 Z" fill="#0F5A5C" />
      <!-- Right -->
      <path d="M 240,120 C 228,117 228,123 215,120 C 228,123 228,127 240,120 Z" fill="#0F5A5C" />
      <!-- Bottom -->
      <path d="M 150,220 C 147,208 153,208 150,195 C 153,208 157,208 150,220 Z" fill="#0F5A5C" />

      <!-- Mandala Dot Accents -->
      <circle cx="150" cy="50" r="3.5" fill="#0F5A5C" />
      <circle cx="220" cy="120" r="3.5" fill="#0F5A5C" />
      <circle cx="150" cy="190" r="3.5" fill="#0F5A5C" />
      <circle cx="80" cy="120" r="3.5" fill="#0F5A5C" />
      
      <circle cx="102" cy="72" r="3" fill="#0F5A5C" />
      <circle cx="198" cy="72" r="3" fill="#0F5A5C" />
      <circle cx="102" cy="168" r="3" fill="#0F5A5C" />
      <circle cx="198" cy="168" r="3" fill="#0F5A5C" />
    </g>

    <!-- 2. Smartphone Frame (Gold / Brown accents) -->
    <g id="smartphone" filter="url(#drop-shadow)">
      <!-- Outer Body -->
      <rect x="110" y="55" width="80" height="130" rx="14" fill="#D4A325" stroke="#4F2E1E" stroke-width="4.5" />
      <!-- Screen Area -->
      <rect x="118" y="70" width="64" height="100" rx="6" fill="#F8F4EE" stroke="#4F2E1E" stroke-width="3" />
      <!-- Speaker Grill -->
      <line x1="140" y1="62" x2="160" y2="62" stroke="#4F2E1E" stroke-width="3" stroke-linecap="round" />
      <!-- Home Button -->
      <circle cx="150" cy="172" r="4.5" fill="#4F2E1E" />
    </g>

    <!-- 3. Traditional Market Stall (Inside Smartphone Screen) -->
    <g id="market-stall">
      <!-- Stall Base (Brown & Red) -->
      <path d="M 122,130 L 178,130 L 178,160 L 122,160 Z" fill="#9E3D29" stroke="#4F2E1E" stroke-width="3" stroke-linejoin="round" />
      <!-- Arch entrance in the stall base -->
      <path d="M 140,160 L 140,146 C 140,140 160,140 160,146 L 160,160 Z" fill="#0F5A5C" stroke="#4F2E1E" stroke-width="2.5" />

      <!-- Stall Counter Top Board -->
      <rect x="120" y="125" width="60" height="8" rx="2" fill="#D4A325" stroke="#4F2E1E" stroke-width="2.5" />

      <!-- Canopy Awnings (Striped Red & Gold Scallops) -->
      <!-- Columns/Poles supporting the canopy -->
      <line x1="126" y1="125" x2="126" y2="92" stroke="#4F2E1E" stroke-width="2.5" />
      <line x1="174" y1="125" x2="174" y2="92" stroke="#4F2E1E" stroke-width="2.5" />

      <!-- Striped Canopy Top -->
      <path d="M 120,95 L 180,95 L 176,82 L 124,82 Z" fill="#9E3D29" stroke="#4F2E1E" stroke-width="2.5" stroke-linejoin="round" />
      <!-- Gold stripes on canopy -->
      <path d="M 132,95 L 144,95 L 142,82 L 134,82 Z" fill="#D4A325" stroke="#4F2E1E" stroke-width="1.5" />
      <path d="M 156,95 L 168,95 L 166,82 L 158,82 Z" fill="#D4A325" stroke="#4F2E1E" stroke-width="1.5" />

      <!-- Scalloped Canopy Edges -->
      <path d="M 120,95 Q 126,102 132,95 Q 138,102 144,95 Q 150,102 156,95 Q 162,102 168,95 Q 174,102 180,95" fill="none" stroke="#4F2E1E" stroke-width="3" />
      <path d="M 120,95 Q 126,102 132,95 L 132,82 L 120,82 Z" fill="#9E3D29" />
      <path d="M 132,95 Q 138,102 144,95 L 144,82 L 132,82 Z" fill="#D4A325" />
      <path d="M 144,95 Q 150,102 156,95 L 156,82 L 144,82 Z" fill="#9E3D29" />
      <path d="M 156,95 Q 162,102 168,95 L 168,82 L 156,82 Z" fill="#D4A325" />
      <path d="M 168,95 Q 174,102 180,95 L 180,82 L 168,82 Z" fill="#9E3D29" />
    </g>
  </g>
</svg>
