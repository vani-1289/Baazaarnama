{% extends 'base.html' %}
{% load static %}

{% block title %}Password Reset Complete | Baazaarnama{% endblock %}

{% block content %}
<div class="container my-5 py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-8 col-sm-10 text-center" data-aos="fade-up">
            <div class="card premium-card border-0 shadow-lg" style="background-color: #fff;">
                <div class="card-body-custom p-5">
                    <div class="text-center">
                        <div class="mb-4 text-success" style="font-size: 4rem;">
                            <i class="far fa-check-circle"></i>
                        </div>
                        <h3 class="font-weight-bold text-dark mb-3">Reset Successful</h3>
                        <p class="text-muted small px-3">
                            Your password has been successfully reset. You may now login using your new password.
                        </p>
                    </div>

                    <div class="d-grid mt-4 pt-3 border-top border-light">
                        <a href="{% url 'users:login' %}" class="btn btn-premium text-white btn-lg">Login Now</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
